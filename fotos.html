<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Foto's – Obvion Racing Team</title>
  <link href="https://fonts.googleapis.com/css2?family=Asap:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Asap,Arial,sans-serif;color:#343434;background:#f8f8f8}
    nav{background:#1a0010;padding:16px 40px;height:110px;overflow:visible;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .logo img{height:156px;width:auto}
    nav ul{list-style:none;display:flex;gap:30px}
    nav a{color:#ccc;text-decoration:none;font-family:Asap,Arial,sans-serif;font-size:.95rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:color .2s}
    nav a:hover{color:#ff7c07}
    nav a.active{color:#ff7c07}
    .fotos-hero{background:linear-gradient(135deg,#1a0010 0%,#3d0030 50%,#1a0010 100%);color:#fff;text-align:center;padding:60px 20px 50px;position:relative;overflow:hidden}
    .fotos-hero::before{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(166,20,98,.05) 40px,rgba(166,20,98,.05) 80px);pointer-events:none}
    .hero-badge{display:inline-block;background:#ff7c07;color:#fff;padding:6px 18px;border-radius:20px;font-size:.8rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
    .fotos-hero h1{font-family:Asap,Arial,sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;letter-spacing:-1px;line-height:1.1}
    .fotos-hero h1 span{color:#ff7c07}
    .gallery-section{max-width:1200px;margin:0 auto;padding:60px 40px}
    .section-label{color:#a61462;font-size:.8rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
    h2{font-family:Asap,Arial,sans-serif;font-size:2.2rem;font-weight:700;color:#a61462;margin-bottom:36px;line-height:1.2}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .gallery-item{border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;background:#1a0010}
    .gallery-item:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.15)}
    .gallery-item img{width:100%;height:260px;object-fit:cover;display:block;transition:opacity .2s}
    .gallery-item:hover img{opacity:.9}
    .gallery-item .caption{padding:14px 16px;background:#fff;font-size:.9rem;color:#555;line-height:1.4}
    .gallery-empty{text-align:center;padding:80px 20px;color:#999}
    .gallery-empty .empty-icon{font-size:4rem;margin-bottom:20px}
    .gallery-empty h3{font-size:1.4rem;color:#ccc;margin-bottom:10px}
    .gallery-empty p{font-size:.95rem;max-width:400px;margin:0 auto}
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center}
    .lightbox.open{display:flex}
    .lightbox-inner{position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center}
    .lightbox-inner img{max-width:90vw;max-height:82vh;border-radius:6px;object-fit:contain;display:block;box-shadow:0 8px 40px rgba(0,0,0,.6)}
    .lightbox-caption{position:absolute;bottom:-36px;left:0;right:0;text-align:center;color:#ccc;font-size:.9rem}
    .lb-close{position:fixed;top:20px;right:28px;font-size:2.2rem;color:#fff;cursor:pointer;background:none;border:none;line-height:1;opacity:.7;transition:opacity .2s}
    .lb-close:hover{opacity:1}
    .lb-prev,.lb-next{position:fixed;top:50%;transform:translateY(-50%);font-size:2.5rem;color:#fff;cursor:pointer;background:rgba(255,255,255,.08);border:none;padding:12px 18px;border-radius:6px;transition:background .2s;line-height:1}
    .lb-prev{left:16px}
    .lb-next{right:16px}
    .lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.18)}
    footer{background:#0d0d0d;color:#555;text-align:center;padding:30px 20px;font-size:.9rem}
    footer span{color:#ff7c07}
    .hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;z-index:200}
    .hamburger span{display:block;width:26px;height:3px;background:#ccc;border-radius:2px;transition:all .3s}
    .hamburger.open span:nth-child(1){transform:translateY(8px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-8px) rotate(-45deg)}
    @media(max-width:700px){nav{padding:16px 20px;height:70px}.logo img{height:90px}.hamburger{display:flex}nav ul{display:none;position:absolute;top:70px;left:0;right:0;background:#1a0010;flex-direction:column;gap:0;padding:10px 0;z-index:150;box-shadow:0 8px 20px rgba(0,0,0,.4)}nav ul.open{display:flex}nav ul li a{display:block;padding:14px 28px;border-bottom:1px solid rgba(255,255,255,.06)}.gallery-grid{grid-template-columns:1fr}.gallery-section{padding:40px 20px}}
  </style>
</head>
